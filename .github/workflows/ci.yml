name: CI

on:
  pull_request:
    paths-ignore:
      - "docs/**"
      - "**/*.md"
      - ".claude/**"
      - ".agents/**"
      - ".gitignore"
      - ".gitattributes"
      - "LICENSE"
  push:
    branches:
      - main
      - develop
    paths-ignore:
      - "docs/**"
      - "**/*.md"
      - ".claude/**"
      - ".agents/**"
      - ".gitignore"
      - ".gitattributes"
      - "LICENSE"

jobs:
  quality:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-22.04
          - macos-latest
          - windows-latest

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Setup bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Format check
        run: bun run format:check

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun run test

      - name: Build frontend
        run: bun run build

      - name: Rust format check
        run: bun run rust:fmt

      - name: Rust clippy
        run: bun run rust:clippy

      - name: Rust tests
        run: bun run rust:test
